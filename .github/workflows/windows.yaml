name: Windows x64

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (CLANG64 environment)
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-boost
          
      - name: Configure and build
        shell: msys2 {0}
        run: |
          mkdir -p build
          cd build
          cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_STATIC_LIBS=ON \
            -DBUILD_SHARED_LIBS=OFF \
            -DBoost_HAS_STATIC_LIBS=ON \
            -DCMAKE_CXX_FLAGS="-static" \
            -DBZIP2_LIBRARY_RELEASE=/msys64/clang64/lib/libbz2.a \            
            -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++ -Wl,--strip-all -Wl,-Bstatic" \
            -DCMAKE_BUILD_TYPE=Release

          cmake --build . --config Release --parallel $(nproc)
          zip -r innoextract.zip innoextract.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: innoextract.zip
          path: build/innoextract.exe
